<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Drawing App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 15px;
            max-width: 900px;
            width: 100%;
            max-height: 98vh;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .toolbar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
        }

        label {
            font-weight: bold;
            color: #333;
            font-size: 13px;
            text-align: center;
        }

        input[type="color"] {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            height: 8px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #f59e0b;
        }

        button.secondary:hover {
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6);
        }

        button.danger {
            background: #ef4444;
        }

        button.danger:hover {
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        canvas {
            display: block;
            background: white;
            cursor: crosshair;
            touch-action: none;
            max-width: 100%;
            width: 100%;
            height: auto;
            border-radius: 10px;
            -webkit-user-select: none;
            user-select: none;
        }

        .size-display {
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            color: #667eea;
            min-width: 40px;
            text-align: center;
            font-size: 13px;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .container {
                border-radius: 15px;
                padding: 12px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 12px;
            }

            .toolbar {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 10px;
            }

            .tool-group {
                gap: 6px;
            }

            label {
                font-size: 12px;
            }

            button {
                padding: 10px 12px;
                font-size: 13px;
                min-height: 40px;
            }

            .size-display {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .container {
                border-radius: 12px;
                padding: 10px;
            }

            h1 {
                font-size: 1.3em;
                margin-bottom: 10px;
            }

            .toolbar {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 8px;
            }

            .tool-group {
                gap: 5px;
            }

            input[type="color"] {
                height: 45px;
            }

            button {
                padding: 10px;
                font-size: 12px;
                min-height: 44px;
            }

            label {
                font-size: 11px;
            }
        }

        /* Landscape mode adjustments */
        @media (max-height: 500px) {
            .container {
                max-height: 95vh;
                padding: 8px;
            }

            h1 {
                font-size: 1.2em;
                margin-bottom: 8px;
            }

            .toolbar {
                padding: 8px;
                gap: 8px;
            }

            canvas {
                max-height: 300px;
            }
        }

        /* Prevent zoom on input focus */
        input[type="color"],
        input[type="range"],
        button {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Kids Drawing App</h1>

        <div class="toolbar">
            <div class="tool-group">
                <label for="colorPicker">Color:</label>
                <input type="color" id="colorPicker" value="#667eea">
            </div>

            <div class="tool-group">
                <label for="brushSize">Brush Size:</label>
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <span class="size-display" id="sizeDisplay">5</span>
            </div>

            <button id="undoBtn" class="secondary">↶ Undo</button>
            <button id="clearBtn" class="danger">🗑️ Clear All</button>
            <button id="saveBtn">💾 Save Drawing</button>
        </div>

        <div class="canvas-container">
            <canvas id="drawingCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const clearBtn = document.getElementById('clearBtn');
        const undoBtn = document.getElementById('undoBtn');
        const saveBtn = document.getElementById('saveBtn');

        // Set canvas size based on device
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            const width = Math.min(800, rect.width - 20);
            const height = Math.min(600, window.innerHeight * 0.6);

            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            ctx.scale(dpr, dpr);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Drawing state
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        const drawingHistory = [];

        // Save canvas state to history
        function saveState() {
            drawingHistory.push(canvas.toDataURL());
            if (drawingHistory.length > 20) {
                drawingHistory.shift();
            }
        }

        // Update brush size display
        brushSize.addEventListener('input', (e) => {
            sizeDisplay.textContent = e.target.value;
        });

        // Get position from event
        function getPosition(e) {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            let x, y;

            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            return { x, y };
        }

        // Drawing functions
        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPosition(e);
            lastX = pos.x;
            lastY = pos.y;
            saveState();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();

            const pos = getPosition(e);
            const x = pos.x;
            const y = pos.y;

            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();

            lastX = x;
            lastY = y;
        }

        function stopDrawing(e) {
            e.preventDefault();
            isDrawing = false;
        }

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing, false);
        canvas.addEventListener('mousemove', draw, false);
        canvas.addEventListener('mouseup', stopDrawing, false);
        canvas.addEventListener('mouseout', stopDrawing, false);

        // Touch events
        canvas.addEventListener('touchstart', startDrawing, false);
        canvas.addEventListener('touchmove', draw, false);
        canvas.addEventListener('touchend', stopDrawing, false);
        canvas.addEventListener('touchcancel', stopDrawing, false);

        // Prevent scrolling while drawing on touch devices
        document.addEventListener('touchmove', (e) => {
            if (e.target === canvas) {
                e.preventDefault();
            }
        }, { passive: false });

        // Button events
        clearBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear everything? 🤔')) {
                const rect = canvas.getBoundingClientRect();
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, rect.width, rect.height);
                drawingHistory.length = 0;
            }
        });

        undoBtn.addEventListener('click', () => {
            if (drawingHistory.length > 1) {
                drawingHistory.pop();
                const previousState = drawingHistory[drawingHistory.length - 1];
                const img = new Image();
                img.src = previousState;
                img.onload = () => {
                    const rect = canvas.getBoundingClientRect();
                    ctx.clearRect(0, 0, rect.width, rect.height);
                    ctx.drawImage(img, 0, 0);
                };
            } else if (drawingHistory.length === 1) {
                const rect = canvas.getBoundingClientRect();
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, rect.width, rect.height);
                drawingHistory.length = 0;
            }
        });

        saveBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'my-drawing-' + new Date().getTime() + '.png';
            link.click();
        });

        // Prevent context menu on canvas
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // Initial save state
        saveState();
    </script>
</body>
</html>
